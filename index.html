<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menacraft Verifier</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Menacraft Verifier</h1>
        <p class="subtitle">Verifying digital truth through AI [cite: 1]</p>

        <div class="axis-block">
            <h2>Axis 1: Content Authenticity</h2>
            <label>Upload one or more images / videos</label>
            <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        </div>

        <div class="axis-block">
            <h2>Axis 2: Contextual Claim</h2>
            <label>Describe the story behind this content (optional)</label>
            <textarea id="claimInput" placeholder="What is the story behind this content?"></textarea>
        </div>

        <div class="axis-block">
            <h2>Axis 3: URL Source</h2>
            <label>Enter a URL to verify (optional)</label>
            <input type="url" id="urlInput" placeholder="https://example.com">
        </div>


        <div class="input-card">
            <button id="verifyButton">VERIFY CONTENT</button>
        </div>

        <div id="resultBox" class="result-card hidden">
            <div class="result-header">
                <span id="statusBadge"></span>
            </div>
            
            <div class="detail-row">
                <strong>Nature du contenu :</strong>
                <span id="contentNature">Inconnue</span>
            </div>
            <div class="detail-row">
                <strong>Existe sur Internet :</strong>
                <span id="internetExists">Inconnu</span>
            </div>
            <div class="detail-row">
                <strong>Source originale :</strong>
                <a id="sourceLink" href="#" target="_blank" rel="noopener noreferrer">Aucune source trouvée</a>
            </div>
            <div class="reasoning-section">
                <strong>Message :</strong>
                <p id="reasoningText"></p>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
